<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <!-- Inner canvas -->
  <rect x="12" y="12" width="376" height="576" rx="4" fill="oklch(0.985 0.009 255.0)"/>

  <!-- Crop marks -->
  <g stroke="oklch(0.450 0.008 121.0)" stroke-width="0.75" fill="none" opacity="0.5">
    <polyline points="0,16 0,0 16,0"/>
    <polyline points="384,0 400,0 400,16"/>
    <polyline points="400,584 400,600 384,600"/>
    <polyline points="16,600 0,600 0,584"/>
  </g>

  <!-- Step connector line -->
  <line x1="200" y1="40" x2="200" y2="540" stroke="oklch(0.501 0.201 19.9)" stroke-width="1" opacity="0.12"/>

  <!-- ═══ Step 1: Feedback Form ═══ -->
  <!-- Step number -->
  <circle cx="200" cy="48" r="12" fill="oklch(0.501 0.201 19.9)" opacity="0.15"/>
  <text x="200" y="52" font-family="Georgia, serif" font-size="11" fill="oklch(0.501 0.201 19.9)" opacity="0.7" text-anchor="middle">1</text>

  <!-- Phone frame -->
  <rect x="100" y="70" width="200" height="140" rx="8" fill="oklch(0.150 0.006 121.6)" opacity="0.04" stroke="oklch(0.940 0.014 255.0)" stroke-width="0.8"/>
  <!-- QR scan prompt -->
  <rect x="150" y="84" width="100" height="8" rx="1.5" fill="oklch(0.150 0.006 121.6)" opacity="0.6"/>
  <!-- Star rating row -->
  <g fill="oklch(0.501 0.201 19.9)" opacity="0.5">
    <circle cx="152" cy="110" r="6"/><circle cx="170" cy="110" r="6"/><circle cx="188" cy="110" r="6"/><circle cx="206" cy="110" r="6"/><circle cx="224" cy="110" r="6"/>
  </g>
  <!-- Text area -->
  <rect x="130" y="128" width="140" height="36" rx="3" fill="none" stroke="oklch(0.450 0.008 121.0)" stroke-width="0.8" opacity="0.25"/>
  <rect x="140" y="136" width="100" height="5" rx="1.5" fill="oklch(0.250 0.008 121.6)" opacity="0.2"/>
  <rect x="140" y="146" width="80" height="5" rx="1.5" fill="oklch(0.250 0.008 121.6)" opacity="0.15"/>
  <!-- Submit button -->
  <rect x="150" y="174" width="100" height="24" rx="4" fill="oklch(0.501 0.201 19.9)" opacity="0.2"/>
  <rect x="172" y="183" width="56" height="6" rx="1.5" fill="oklch(0.501 0.201 19.9)" opacity="0.5"/>

  <!-- Arrow down -->
  <polygon points="194,224 200,236 206,224" fill="oklch(0.450 0.008 121.0)" opacity="0.25"/>

  <!-- ═══ Step 2: Thank You + Coupon ═══ -->
  <circle cx="200" cy="252" r="12" fill="oklch(0.501 0.201 19.9)" opacity="0.15"/>
  <text x="200" y="256" font-family="Georgia, serif" font-size="11" fill="oklch(0.501 0.201 19.9)" opacity="0.7" text-anchor="middle">2</text>

  <rect x="100" y="274" width="200" height="120" rx="8" fill="oklch(0.150 0.006 121.6)" opacity="0.04" stroke="oklch(0.940 0.014 255.0)" stroke-width="0.8"/>
  <!-- Checkmark circle -->
  <circle cx="200" cy="300" r="14" fill="oklch(0.501 0.201 19.9)" opacity="0.15"/>
  <polyline points="192,300 198,306 210,294" stroke="oklch(0.501 0.201 19.9)" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Thank you text -->
  <rect x="156" y="322" width="88" height="8" rx="1.5" fill="oklch(0.150 0.006 121.6)" opacity="0.55"/>
  <!-- Coupon code box -->
  <rect x="130" y="340" width="140" height="32" rx="4" fill="oklch(0.501 0.201 19.9)" opacity="0.08" stroke="oklch(0.501 0.201 19.9)" stroke-width="0.8" stroke-dasharray="4 2" opacity="0.3"/>
  <rect x="160" y="350" width="80" height="10" rx="2" fill="oklch(0.150 0.006 121.6)" opacity="0.6"/>
  <!-- Copy hint -->
  <rect x="166" y="366" width="68" height="4" rx="1" fill="oklch(0.450 0.008 121.0)" opacity="0.3"/>

  <!-- Arrow down -->
  <polygon points="194,408 200,420 206,408" fill="oklch(0.450 0.008 121.0)" opacity="0.25"/>

  <!-- ═══ Step 3: Google Redirect ═══ -->
  <circle cx="200" cy="436" r="12" fill="oklch(0.501 0.201 19.9)" opacity="0.15"/>
  <text x="200" y="440" font-family="Georgia, serif" font-size="11" fill="oklch(0.501 0.201 19.9)" opacity="0.7" text-anchor="middle">3</text>

  <rect x="100" y="458" width="200" height="80" rx="8" fill="oklch(0.150 0.006 121.6)" opacity="0.04" stroke="oklch(0.940 0.014 255.0)" stroke-width="0.8"/>
  <!-- Google logo placeholder -->
  <rect x="168" y="472" width="64" height="10" rx="2" fill="oklch(0.150 0.006 121.6)" opacity="0.5"/>
  <!-- Redirect message -->
  <rect x="140" y="494" width="120" height="5" rx="1.5" fill="oklch(0.250 0.008 121.6)" opacity="0.3"/>
  <!-- External link arrow -->
  <polygon points="196,514 200,508 204,514" fill="oklch(0.450 0.008 121.0)" opacity="0.2" transform="rotate(180 200 511)"/>
  <rect x="156" y="510" width="88" height="6" rx="1.5" fill="oklch(0.501 0.201 19.9)" opacity="0.35"/>

  <!-- Plate label -->
  <text x="368" y="572" font-family="Georgia, serif" font-size="9" fill="oklch(0.450 0.008 121.0)" opacity="0.5" text-anchor="end" font-style="italic">Pl. 4</text>
</svg>
